<!DOCTYPE html>
<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Inter, system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #333;
        padding: 16px;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      h2 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .input-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        margin-bottom: 12px;
      }

      textarea {
        flex: 1;
        width: 100%;
        min-height: 200px;
        padding: 10px;
        font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, monospace;
        font-size: 12px;
        line-height: 1.5;
        border: 1px solid #d9d9d9;
        border-radius: 6px;
        resize: none;
        outline: none;
        background: #fafafa;
      }

      textarea:focus {
        border-color: #18a0fb;
        background: #fff;
      }

      textarea::placeholder {
        color: #999;
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      button {
        height: 32px;
        padding: 0 16px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }

      button.primary {
        background: #18a0fb;
        color: #fff;
      }

      button.primary:hover {
        background: #0d8de5;
      }

      button.primary:disabled {
        background: #b3d9f7;
        cursor: not-allowed;
      }

      .status {
        font-size: 12px;
        color: #666;
        min-height: 18px;
      }

      .status.error {
        color: #e03131;
      }

      .example-link {
        font-size: 12px;
        color: #18a0fb;
        cursor: pointer;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h2>Diagram Buddy</h2>

    <div class="input-area">
      <textarea
        id="mermaid-input"
        placeholder="flowchart TD
    A[Start] --> B{Valid?}
    B -->|Yes| C[Process]
    B -->|No| D[Error]
    C --> E((End))"
        spellcheck="false"
      ></textarea>
    </div>

    <div class="actions">
      <span class="example-link" id="load-example">Load example</span>
      <button class="primary" id="generate-btn">Generate</button>
    </div>
    <div class="status" id="status"></div>

    <!-- INLINE_SCRIPT -->
  </body>
</html>
